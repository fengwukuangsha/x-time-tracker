<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #1d9bf0, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .status-card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .status-label {
      font-size: 11px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .status-label.active { color: #22c55e; }
    .status-label.warning { color: #f59e0b; }
    .status-label.danger { color: #ef4444; }

    .timer {
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    .timer.green { color: #22c55e; }
    .timer.yellow { color: #f59e0b; }
    .timer.red { color: #ef4444; }
    .timer.idle { color: #525252; font-size: 24px; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #262626;
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s linear, background 0.5s;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      flex: 1;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #e5e5e5;
    }
    .stat-label {
      font-size: 10px;
      color: #737373;
      margin-top: 4px;
    }

    /* Honor Card */
    .honor-card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .honor-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .honor-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: #1a1a1a;
      flex-shrink: 0;
      border: 1px solid #262626;
    }
    .honor-detail {
      flex: 1;
      min-width: 0;
    }
    .honor-name {
      font-size: 14px;
      font-weight: 600;
      display: block;
    }
    .honor-points-text {
      font-size: 11px;
      color: #737373;
      display: block;
      margin-top: 2px;
    }
    .streak-tag {
      display: flex;
      align-items: center;
      gap: 3px;
      background: #1a1a1a;
      border: 1px solid #262626;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
      transition: color 0.3s;
    }
    .level-bar {
      width: 100%;
      height: 3px;
      background: #262626;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .level-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.5s ease;
    }
    .level-hint {
      font-size: 10px;
      color: #525252;
    }

    .bonus-toast {
      position: fixed;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: #22c55e;
      color: #fff;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .bonus-toast.show {
      opacity: 1;
    }

    .settings-section {
      margin-top: 12px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 13px; }
    .setting-input {
      width: 60px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      padding: 4px 8px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }
    .setting-input:focus { border-color: #1d9bf0; }
    .btn-reset {
      background: none;
      border: 1px solid #333;
      color: #a3a3a3;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: #ef4444; color: #ef4444; }

    /* History Section */
    .history-section {
      margin-top: 8px;
    }
    .history-toggle {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 10px 14px;
      color: #a3a3a3;
      font-size: 13px;
      cursor: pointer;
    }
    .history-toggle:hover { border-color: #1d9bf0; color: #e5e5e5; }
    .history-panel {
      max-height: 220px;
      overflow-y: auto;
      margin-top: 8px;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 10px 12px;
    }
    .history-panel::-webkit-scrollbar { width: 4px; }
    .history-panel::-webkit-scrollbar-track { background: transparent; }
    .history-panel::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    .history-date {
      font-size: 11px;
      color: #737373;
      padding: 6px 0 4px;
      border-bottom: 1px solid #1a1a1a;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
    }
    .history-date:first-child { padding-top: 2px; }
    .history-day-total { color: #404040; font-weight: 400; }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 12px;
      border-bottom: 1px solid #1a1a1a;
    }
    .history-item:last-child { border-bottom: none; }
    .history-time { color: #737373; }
    .history-dur { color: #e5e5e5; font-weight: 600; }
    .history-empty { color: #525252; font-size: 12px; text-align: center; padding: 20px 0; }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #404040;
    }
  </style>
</head>
<body>
  <div id="bonusToast" class="bonus-toast"></div>

  <div class="header">
    <div class="logo">X</div>
    <h1>Time Tracker</h1>
  </div>

  <div class="status-card">
    <div id="statusLabel" class="status-label">等待访问 x.com</div>
    <div id="timer" class="timer idle">--:--</div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill" style="width: 0%; background: #22c55e;"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div id="todayTotal" class="stat-value">0m</div>
      <div class="stat-label">今日累计</div>
    </div>
    <div class="stat">
      <div id="limitDisplay" class="stat-value">10m</div>
      <div class="stat-label">时间上限</div>
    </div>
  </div>

  <div class="honor-card">
    <div class="honor-top">
      <div class="honor-icon" id="honorIcon">🌱</div>
      <div class="honor-detail">
        <span class="honor-name" id="honorName">新手</span>
        <span class="honor-points-text" id="honorPoints">0 积分</span>
      </div>
      <div class="streak-tag" id="streakTag">
        <span id="streakFire">🔥</span>
        <span id="streakDays">0</span>天
      </div>
    </div>
    <div class="level-bar">
      <div class="level-fill" id="levelFill" style="width: 0%; background: #737373;"></div>
    </div>
    <div class="level-hint" id="levelHint">距离下一等级还需 50 积分</div>
  </div>

  <div class="settings-section">
    <div class="setting-row">
      <span class="setting-label">提醒间隔（分钟）</span>
      <input id="limitInput" type="number" class="setting-input" min="1" max="120" value="10">
    </div>
    <div class="setting-row">
      <span class="setting-label">重置今日统计</span>
      <button id="resetBtn" class="btn-reset">重置</button>
    </div>
  </div>

  <div class="history-section">
    <button id="historyToggle" class="history-toggle">
      <span>历史记录</span>
      <span id="historyArrow">&#9662;</span>
    </button>
    <div id="historyPanel" class="history-panel" style="display:none;">
      <div id="historyList"></div>
    </div>
  </div>

  <div class="footer">离开 x.com 自动暂停计时</div>

  <script src="popup.js"></script>
</body>
</html>
