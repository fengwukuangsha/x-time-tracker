<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #1d9bf0, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 16px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
    }

    .status-card {
      background: #141414;
      border: 1px solid #262626;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .status-label {
      font-size: 11px;
      color: #737373;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .status-label.active { color: #22c55e; }
    .status-label.warning { color: #f59e0b; }
    .status-label.danger { color: #ef4444; }

    .timer {
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: 2px;
    }
    .timer.green { color: #22c55e; }
    .timer.yellow { color: #f59e0b; }
    .timer.red { color: #ef4444; }
    .timer.idle { color: #525252; font-size: 24px; }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: #262626;
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 1s linear, background 0.5s;
    }

    .stats-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }
    .stat {
      flex: 1;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #e5e5e5;
    }
    .stat-label {
      font-size: 10px;
      color: #737373;
      margin-top: 4px;
    }

    .settings-section {
      margin-top: 12px;
    }
    .setting-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a1a1a;
    }
    .setting-row:last-child { border-bottom: none; }
    .setting-label { font-size: 13px; }
    .setting-input {
      width: 60px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e5e5e5;
      padding: 4px 8px;
      font-size: 13px;
      text-align: center;
      outline: none;
    }
    .setting-input:focus { border-color: #1d9bf0; }
    .btn-reset {
      background: none;
      border: 1px solid #333;
      color: #a3a3a3;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-reset:hover { border-color: #ef4444; color: #ef4444; }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 11px;
      color: #404040;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">X</div>
    <h1>Time Tracker</h1>
  </div>

  <div class="status-card">
    <div id="statusLabel" class="status-label">等待访问 x.com</div>
    <div id="timer" class="timer idle">--:--</div>
    <div class="progress-bar">
      <div id="progressFill" class="progress-fill" style="width: 0%; background: #22c55e;"></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat">
      <div id="todayTotal" class="stat-value">0m</div>
      <div class="stat-label">今日累计</div>
    </div>
    <div class="stat">
      <div id="limitDisplay" class="stat-value">10m</div>
      <div class="stat-label">时间上限</div>
    </div>
  </div>

  <div class="settings-section">
    <div class="setting-row">
      <span class="setting-label">提醒间隔（分钟）</span>
      <input id="limitInput" type="number" class="setting-input" min="1" max="120" value="10">
    </div>
    <div class="setting-row">
      <span class="setting-label">重置今日统计</span>
      <button id="resetBtn" class="btn-reset">重置</button>
    </div>
  </div>

  <div class="footer">离开 x.com 自动暂停计时</div>

  <script src="popup.js"></script>
</body>
</html>
